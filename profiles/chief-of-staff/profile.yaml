description: >-
  Chief of Staff — amplifies the leader's capacity by managing their information
  flow, calendar, decision pipeline, and cross-functional coordination. Provides
  gatekeeping and triage, executive briefing, organizational sensing, institutional
  memory, and pre-wired decision support. Optimizes for leader effectiveness —
  not for owning any single domain.
