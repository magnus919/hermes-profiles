name: Profile Checks
on:
  pull_request:
    paths:
      - 'profiles/**'
      - 'skills/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate profile metadata and skill wiring
        run: python3 scripts/validate_profiles.py

      - name: Check README.md reflects current profiles and skills
        run: |
          errors=0
          actual_profiles=$(ls profiles/ | wc -l | tr -d ' ')
          readme_profiles=$(grep -cE "├── [a-z].*/.*←|└── [a-z].*/.*←" README.md)
          if [ "$readme_profiles" -ne "$actual_profiles" ]; then
            echo "README.md lists $readme_profiles profiles but $actual_profiles profiles exist"
            errors=$((errors + 1))
          fi
          actual_skills=$(ls skills/ | wc -l | tr -d ' ')
          readme_skills=$(grep -cE "^│   [├└]── [a-z]" README.md)
          if [ "$readme_skills" -ne "$actual_skills" ]; then
            echo "README.md skills section may be out of date ($readme_skills listed, $actual_skills exist)"
            errors=$((errors + 1))
          fi
          if [ "$errors" -gt 0 ]; then
            echo "Update README.md to reflect current profiles and skills"
            exit 1
          fi
          echo "README.md matches $(ls profiles/ | wc -l | tr -d ' ') profiles and $(ls skills/ | wc -l | tr -d ' ') skills"
