name: Profile Checks
on:
  pull_request:
    paths:
      - 'profiles/**'
      - 'skills/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all symlinks resolve
        run: |
          broken=0
          while IFS= read -r link; do
            if [ ! -e "$link" ]; then
              echo "BROKEN: $link -> $(readlink "$link")"
              broken=$((broken + 1))
            fi
          done < <(find profiles -type l)
          if [ "$broken" -gt 0 ]; then
            echo "Found $broken broken symlinks"
            exit 1
          fi
          echo "All symlinks resolve correctly"

      - name: Check required files per profile
        run: |
          errors=0
          for profile in profiles/*/; do
            name=$(basename "$profile")
            for f in SOUL.md profile.yaml README.md AGENTS.md; do
              if [ ! -f "${profile}${f}" ]; then
                echo "MISSING: $name/$f"
                errors=$((errors + 1))
              fi
            done
          done
          if [ "$errors" -gt 0 ]; then
            echo "Found $errors missing files"
            exit 1
          fi
          echo "All profiles have required files"

      - name: Validate YAML syntax in profile.yaml files
        run: |
          errors=0
          for f in profiles/*/profile.yaml; do
            if ! python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null; then
              echo "INVALID YAML: $f"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "Found $errors invalid YAML files"
            exit 1
          fi
          echo "All profile.yaml files valid"

      - name: Check README.md reflects current profiles and skills
        run: |
          errors=0
          actual_profiles=$(ls profiles/ | wc -l | tr -d ' ')
          readme_profiles=$(grep -cE "├── [a-z].*/.*←|└── [a-z].*/.*←" README.md)
          if [ "$readme_profiles" -ne "$actual_profiles" ]; then
            echo "README.md lists $readme_profiles profiles but $actual_profiles profiles exist"
            errors=$((errors + 1))
          fi
          actual_skills=$(ls skills/ | wc -l | tr -d ' ')
          readme_skills=$(grep -cE "^│   [├└]── [a-z]" README.md)
          if [ "$readme_skills" -ne "$actual_skills" ]; then
            echo "README.md skills section may be out of date ($readme_skills listed, $actual_skills exist)"
            errors=$((errors + 1))
          fi
          if [ "$errors" -gt 0 ]; then
            echo "Update README.md to reflect current profiles and skills"
            exit 1
          fi
          echo "README.md matches $(ls profiles/ | wc -l | tr -d ' ') profiles and $(ls skills/ | wc -l | tr -d ' ') skills"
