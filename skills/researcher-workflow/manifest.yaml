bundle_name: researcher-workflow
generated: 2026-05-31
archetype: custom-research-synthesis
kanban: false

skills:
  - name: receive-mission
    file: skills/receive-mission.md
    trigger:
      type: context
      context: Orchestrator dispatches a research mission
      description: >-
        Entry point. Reformulates the orchestrator's brief into explicit
        research questions, scope boundaries, and depth targets.

  - name: research-gather
    file: skills/research-gather.md
    trigger:
      type: context
      context: After scope document exists
      description: >-
        Executes multi-pass research using groktocrawl suite exclusively.
        Prohibits web_search and web_extract tools.

  - name: evaluate-gaps
    file: skills/evaluate-gaps.md
    trigger:
      type: context
      context: After initial gather pass completes
      description: >-
        Applies the three-question model to decide whether to recurse
        deeper or proceed to pyramid assembly.

  - name: build-pyramid
    file: skills/build-pyramid.md
    trigger:
      type: context
      context: After gap evaluation indicates saturation
      description: >-
        Assembles progressive disclosure artifact files in /tmp/ with
        three layers: summary, analysis collection, detailed dossiers.

  - name: deliver-findings
    file: skills/deliver-findings.md
    trigger:
      type: context
      context: After pyramid assembly is complete
      description: >-
        Reports back with absolute path references and descriptions of
        what each layer contains.
